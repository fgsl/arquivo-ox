name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: compile
      run: gcc ./test_arquivo-ox.c -o test_arquivo-ox
    - name: execute
      run: ./test_arquivo-ox
