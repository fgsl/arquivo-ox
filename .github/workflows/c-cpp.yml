name: C Project

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compilar programa principal
        run: |
          gcc ./arquivo-ox.c -o arquivo-ox

      - name: Executar programa
        run: |
          ./programa skibidiArquivo.txt O O O X X X O O O

      - name: Verificar arquivo gerado
        run: |
          test -f teste.txt

      - name: Compilar testes
        run: |
          gcc -Wall -Wextra -o testes test_validar.c function_skibidi.c

      - name: Executar testes
        run: |
          ./testes
