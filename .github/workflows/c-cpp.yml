name: C Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Compilar
        run: gcc -Wall -Wextra -o teste main.c

      - name: Executar testes
        run: ./teste
